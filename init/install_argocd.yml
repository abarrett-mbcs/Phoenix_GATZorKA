- name: Set Kubeconfig path for this include
  set_fact:
    k8s_kubeconfig: "/home/{{ ansible_env.SUDO_USER }}/.kube/config"
    
- name: Bootstrap ArgoCD via Helm
  kubernetes.core.helm:
    kubeconfig: "{{ k8s_kubeconfig }}"
    name: argocd
    chart_ref: argo-cd
    release_namespace: argocd
    create_namespace: true
    chart_repo_url: https://argoproj.github.io/argo-helm
    values:
      server:
        service:
          type: ClusterIP

- name: Define the Phoenix "Application" in ArgoCD
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: phoenix-web-app
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: 'https://github.com/abarrett-mbcs/Phoenix_GATZorKA.git'
          targetRevision: HEAD
          path: k8s-projects/charts/phoenix-web
        destination:
          server: 'https://kubernetes.default.svc'
          namespace: default
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
