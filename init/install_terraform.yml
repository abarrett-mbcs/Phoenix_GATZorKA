- name: Download and De-armor HashiCorp Key
  become: true
  shell: |
    curl -fsSL https://apt.releases.hashicorp.com/gpg | \
    gpg --dearmor --yes -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

- name: Force Create the List File
  become: true
  copy:
    dest: /etc/apt/sources.list.d/hashicorp.list
    content: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com noble main"
    mode: '0644'

- name: Install Terraform
  become: true
  apt:
    name: terraform
    state: present
    update_cache: yes

- name: 🕵️ Check State File Existence
  become: true
  become_user: "{{ ansible_env.SUDO_USER }}"
  stat:
    path: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform/terraform.tfstate"
  register: st

- name: 📊 Report Finding
  debug:
    msg: "Does the state file exist? {{ st.stat.exists }} - Path: {{ st.stat.path }}"

- name: Prepare Terraform Working Directory
  become: false  # Usually run as your local user
  file:
    path: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform"
    state: directory
    mode: '0755'

- name: Sync Terraform configuration from Repo to Workspace
  become: false
  # 'synchronize' is like a smart 'cp -r' that uses rsync logic
  synchronize:
    src: "~/Developer/GATZorKA/Init/Phoenix_GATZorKA/terraform/"
    dest: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform/"
    recursive: yes
    delete: yes # This keeps the workspace clean of "old junk"

- name: 🏗️ Initialize and Apply Terraform (The 2026 Way)
  become: true
  become_user: "{{ ansible_env.SUDO_USER }}"
  community.general.terraform:
    project_path: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform"
    state: present
    force_init: true
    # We remove the 'state_file' parameter here because it triggers the 
    # deprecated -state flag. Instead, we let Terraform find 'terraform.tfstate' 
    # naturally in the project_path.
  environment:
    # This ensures Terraform doesn't go looking in ~/.local/ or /root/
    TF_DATA_DIR: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform/.terraform"
  register: tf_result
  
- name: Show Terraform Output
  debug:
    var: tf_result
