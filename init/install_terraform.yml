- name: Initialize and Apply Terraform
  become: false  
  community.general.terraform:
    project_path: "/home/{{ ansible_env.SUDO_USER }}/k8s-projects/terraform"
#    plan_file: "/home/{{ user }}/k8s-projects/terraform/phoenix.tfplan"
    state: present
    force_init: true    #remove this line if you are using the plan file
  register: tf_result

- name: Show Terraform Output
  debug:
    var: tf_result # tf_result.stdout_lines


