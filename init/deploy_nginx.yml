- name: Deploy Replicated Nginx
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: phoenix-web-deployment
        namespace: default
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: phoenix
        template:
          metadata:
            labels:
              app: phoenix
          spec:
            containers:
            - name: nginx
              image: nginx:latest
              ports:
              - containerPort: 80
