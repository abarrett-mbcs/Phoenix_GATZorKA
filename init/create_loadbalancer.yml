- name: Create LoadBalancer Service for Nginx
  kubernetes.core.k8s:
    kubeconfig: "/home/{{ ansible_env.SUDO_USER }}/.kube/config"
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: phoenix-svc
        namespace: default
      spec:
        type: NodePort
        selector:
          app: phoenix  # This MUST match the label on your Deployment
        ports:
          - protocol: TCP
            port: 80          # The port on the Service
            nodePort: 30080
            targetPort: 80    # The port on the Pod
