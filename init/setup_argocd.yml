- name: Set Kubeconfig path for this include
  set_fact:
    k8s_kubeconfig: "/home/{{ ansible_env.SUDO_USER }}/.kube/config"
    
- name: Create Ingress for ArgoCD UI
  kubernetes.core.k8s:
    kubeconfig: "{{ k8s_kubeconfig }}"
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: argocd-server-ingress
        namespace: argocd
      spec:
        rules:
          - host: argocd.localhost
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: argocd-server
                      port:
                        number: 80
