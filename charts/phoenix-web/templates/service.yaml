apiVersion: v1
kind: Service
metadata:
  # This name must match exactly what your Ingress expects
  name: {{ .Values.service.name }}
spec:
  type: ClusterIP
  selector:
    # This MUST match the labels in your deployment.yaml
    app: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 80
